<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Chat Platform</title>
    <script>
        (function() {
            var cachedTheme = localStorage.getItem('user_theme');
            if (cachedTheme) {
                document.body.setAttribute('data-theme', cachedTheme);
            }
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const prism = window.Prism;
    </script>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-comments"></i>
                    <span>AI Chat</span>
                </div>
                <button class="new-chat-btn" id="newChatBtn">
                    <i class="fas fa-plus"></i>
                    <span>新对话</span>
                </button>
            </div>
            
            <div class="sidebar-nav">
            </div>
            
            <div class="conversations-list" id="conversationsList">
                <!-- 对话列表将动态加载 -->
                <div class="load-more-container" id="loadMoreContainer">
                    <button class="load-more-btn" id="loadMoreBtn" onclick="loadMoreConversations()">加载更多</button>
                    <div class="loading-spinner" id="loadingSpinner" style="display: none;"></div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="user-info" id="userInfo">
                    <i class="fas fa-user-circle"></i>
                    <span id="username">加载中...</span>
                    <button class="logout-btn" id="logoutBtn" title="退出登录">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content" id="mainContent">
            <!-- 顶部栏 -->
            <header class="chat-header">
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="model-selector">
                    <select id="agentSelect">
                        <option value="">默认模式</option>
                    </select>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" id="clearBtn" title="清空对话">
                        <i class="fas fa-trash"></i>
                    </button>
                    <div class="dropdown" id="moreActionsDropdown">
                        <button class="icon-btn dropdown-toggle" id="moreActionsBtn" title="更多操作">
                            <i class="fas fa-ellipsis-h"></i>
                        </button>
                        <div class="dropdown-menu" id="moreActionsMenu">
                            <div class="dropdown-item" id="openTools">
                                <i class="fas fa-tools"></i>
                                <span>工具列表</span>
                            </div>
                            <div class="dropdown-divider"></div>

                            <div class="dropdown-item" id="openAgents">
                                <i class="fas fa-robot"></i>
                                <span>Agent 管理</span>
                            </div>
                            <div class="dropdown-divider"></div>
                            <div class="dropdown-item" id="openPrompts">
                                <i class="fas fa-file-alt"></i>
                                <span>提示词管理</span>
                            </div>
                            <div class="dropdown-divider"></div>
                            <div class="dropdown-item" id="openSchedules">
    <i class="fas fa-clock"></i>
    <span>定时任务</span>
</div>
<div class="dropdown-divider"></div>
<div class="dropdown-item" id="openAsyncTasks">
    <i class="fas fa-tasks"></i>
    <span>异步任务</span>
</div>
<div class="dropdown-divider"></div>
                            <div class="dropdown-item" id="openWorkflows">
                                <i class="fas fa-project-diagram"></i>
                                <span>工作流</span>
                            </div>
                            <div class="dropdown-divider"></div>
                            <div class="dropdown-item" id="openKnowledge">
                                <i class="fas fa-book"></i>
                                <span>知识库</span>
                            </div>
                            <div class="dropdown-divider"></div>
                            <a href="/skills" class="dropdown-item">
                                <i class="fas fa-cogs"></i>
                                <span>Skills 管理</span>
                            </a>
                            <div class="dropdown-divider"></div>
                            <a href="https://github.com/looken1024/arc-logi" class="dropdown-item" target="_blank">
                                <i class="fab fa-github"></i>
                                <span>GitHub</span>
                            </a>
                        </div>
                    </div>
                    <button class="icon-btn" id="settingsBtn" title="设置">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
            </header>

            <!-- 聊天区域 -->
            <div class="chat-container" id="chatContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-content">
                        <i class="fas fa-robot"></i>
                    </div>
                </div>
                
                <div class="messages-container" id="messagesContainer">
                    <!-- 消息将动态加载 -->
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea 
                        id="messageInput" 
                        placeholder="输入消息，Enter发送"
                        rows="1"
                    ></textarea>
                    <button class="voice-btn" id="voiceBtn">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button class="send-btn" id="sendBtn" disabled>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- 设置模态框 -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-cog"></i> 设置</h2>
                <button class="modal-close" id="closeSettings">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="setting-section">
                    <h3>主题颜色</h3>
                    <p class="setting-description">选择您喜欢的界面主题</p>
                    <div class="theme-options">
                        <div class="theme-option" data-theme="dark">
                            <div class="theme-preview dark-theme">
                                <div class="preview-header"></div>
                                <div class="preview-body"></div>
                            </div>
                            <span>深色(默认)</span>
                            <i class="fas fa-check theme-check"></i>
                        </div>
                        <div class="theme-option" data-theme="light">
                            <div class="theme-preview light-theme">
                                <div class="preview-header"></div>
                                <div class="preview-body"></div>
                            </div>
                            <span>浅色</span>
                            <i class="fas fa-check theme-check"></i>
                        </div>
                        <div class="theme-option" data-theme="blue">
                            <div class="theme-preview blue-theme">
                                <div class="preview-header"></div>
                                <div class="preview-body"></div>
                            </div>
                            <span>蓝色</span>
                            <i class="fas fa-check theme-check"></i>
                        </div>
                        <div class="theme-option" data-theme="green">
                            <div class="theme-preview green-theme">
                                <div class="preview-header"></div>
                                <div class="preview-body"></div>
                            </div>
                            <span>绿色</span>
                            <i class="fas fa-check theme-check"></i>
                        </div>
                        <div class="theme-option" data-theme="purple">
                            <div class="theme-preview purple-theme">
                                <div class="preview-header"></div>
                                <div class="preview-body"></div>
                            </div>
                            <span>紫色</span>
                            <i class="fas fa-check theme-check"></i>
                        </div>
                        <div class="theme-option" data-theme="red">
                            <div class="theme-preview red-theme">
                                <div class="preview-header"></div>
                                <div class="preview-body"></div>
                            </div>
                            <span>红色</span>
                            <i class="fas fa-check theme-check"></i>
                        </div>
                        <div class="theme-option" data-theme="orange">
                            <div class="theme-preview orange-theme">
                                <div class="preview-header"></div>
                                <div class="preview-body"></div>
                            </div>
                            <span>橙色</span>
                            <i class="fas fa-check theme-check"></i>
                        </div>
                        <div class="theme-option" data-theme="pink">
                            <div class="theme-preview pink-theme">
                                <div class="preview-header"></div>
                                <div class="preview-body"></div>
                            </div>
                            <span>粉色</span>
                            <i class="fas fa-check theme-check"></i>
                        </div>
                        <div class="theme-option" data-theme="cyan">
                            <div class="theme-preview cyan-theme">
                                <div class="preview-header"></div>
                                <div class="preview-body"></div>
                            </div>
                            <span>青色</span>
                            <i class="fas fa-check theme-check"></i>
                        </div>
                        <div class="theme-option" data-theme="indigo">
                            <div class="theme-preview indigo-theme">
                                <div class="preview-header"></div>
                                <div class="preview-body"></div>
                            </div>
                            <span>靛蓝色</span>
                            <i class="fas fa-check theme-check"></i>
                        </div>
                    </div>
                </div>
                <div class="setting-section">
                    <h3>个人信息</h3>
                    <p class="setting-description">设置您的个人称呼和信息，让AI更好地与您交流</p>
                    <div class="profile-form">
                        <div class="form-group">
                            <label for="nickname">个人称呼（昵称）</label>
                            <input type="text" id="nickname" placeholder="请输入昵称或姓名" maxlength="50">
                        </div>
                        <div class="form-group">
                            <label for="realName">真实姓名</label>
                            <input type="text" id="realName" placeholder="可选" maxlength="50">
                        </div>
                        <div class="form-group">
                            <label for="gender">性别</label>
                            <select id="gender">
                                <option value="unknown">保密</option>
                                <option value="male">男</option>
                                <option value="female">女</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="age">年龄</label>
                            <input type="number" id="age" placeholder="可选" min="1" max="150">
                        </div>
                        <div class="form-group">
                            <label for="occupation">职业</label>
                            <input type="text" id="occupation" placeholder="可选，如：软件工程师" maxlength="100">
                        </div>
                        <div class="form-group">
                            <label for="bio">个人简介</label>
                            <textarea id="bio" placeholder="介绍一下自己，帮助AI更好地了解您" rows="3" maxlength="500"></textarea>
                        </div>
                        <button class="btn-primary" id="saveProfileBtn">
                            <i class="fas fa-save"></i>
                            <span>保存个人信息</span>
                        </button>
                    </div>
                </div>
                <div class="setting-section">
                    <h3>AI 交互偏好</h3>
                    <p class="setting-description">自定义AI与您的交互方式</p>
                    <div class="preferences-form">
                        <div class="form-group checkbox-group">
                            <label>
                                <input type="checkbox" id="useNickname" checked>
                                <span>使用昵称称呼我</span>
                            </label>
                        </div>
                        <div class="form-group checkbox-group">
                            <label>
                                <input type="checkbox" id="rememberContext" checked>
                                <span>记住对话上下文和偏好</span>
                            </label>
                        </div>
                        <div class="form-group checkbox-group">
                            <label>
                                <input type="checkbox" id="personalizedResponses" checked>
                                <span>提供个性化回答</span>
                            </label>
                        </div>
                        <div class="form-group">
                            <label for="aiPersonality">AI 对话风格</label>
                            <select id="aiPersonality">
                                <option value="friendly">友好型</option>
                                <option value="professional">专业型</option>
                                <option value="casual">轻松型</option>
                                <option value="humorous">幽默型</option>
                            </select>
                        </div>
                        <button class="btn-primary" id="savePreferencesBtn">
                            <i class="fas fa-save"></i>
                            <span>保存偏好设置</span>
                        </button>
                    </div>
                </div>
                <div class="setting-section">
                    <h3>账户</h3>
                    <p class="setting-description">管理您的账户设置</p>
                    <button class="logout-btn" onclick="logout()" style="margin-top: 10px;">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>退出登录</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
